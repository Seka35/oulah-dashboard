version: '3.8'

services:
  # 1. Main Dashboard + Automation Worker (in-thread)
  main-app:
    build: .
    container_name: ad_intel_main
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: .env
    volumes:
      - ./static:/app/static
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 2. Scraper Worker (Media/Landing Pages)
  scraper-worker:
    build: .
    container_name: ad_intel_scraper
    restart: unless-stopped
    command: ["python", "media_worker.py"]
    env_file: .env
    volumes:
      - ./static:/app/static
      - ./logs:/app/logs

  # 3. Media Buying Dashboard
  media-buying-app:
    build: .
    container_name: ad_intel_media_buying
    restart: unless-stopped
    working_dir: /app/media_buy_systeme
    command: ["python", "run.py"]
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      - PORT=5001
      - PYTHONPATH=/app/media_buy_systeme
    volumes:
      - ./logs:/app/logs

  # 4. Media Buying Ads Worker
  media-buying-worker:
    build: .
    container_name: ad_intel_media_worker
    restart: unless-stopped
    working_dir: /app/media_buy_systeme
    command: ["python", "worker.py"]
    env_file: .env
    environment:
      - PYTHONPATH=/app/media_buy_systeme
    volumes:
      - ./logs:/app/logs